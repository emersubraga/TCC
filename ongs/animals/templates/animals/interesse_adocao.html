{% extends "base_public.html" %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10">

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
    <h1 class="text-2xl font-extrabold text-slate-900 flex items-center gap-2">
      <i class="fa-solid fa-heart text-emerald-700"></i>
      Tenho interesse em adotar
    </h1>

    <p class="text-sm text-slate-600 mt-2">
      Animal: <span class="font-semibold">{{ animal.nome }}</span>
    </p>

    <form method="post" action="{% url 'interesse_adocao' animal.id %}?next={{ next|urlencode }}" class="mt-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Seu contato (obrigatório)</label>
        <input name="contato" value="{{ contato_padrao }}"
               class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2.5 focus:outline-none focus:ring-4 focus:ring-emerald-200 focus:border-emerald-600 transition"
               placeholder="WhatsApp, telefone ou e-mail">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Mensagem (opcional)</label>
        <textarea name="mensagem" rows="4"
                  class="w-full rounded-xl border border-gray-300 bg-gray-50 px-3 py-2.5 focus:outline-none focus:ring-4 focus:ring-emerald-200 focus:border-emerald-600 transition"
                  placeholder="Ex: posso buscar hoje, tenho quintal, etc..."></textarea>
      </div>

      <button class="w-full rounded-xl bg-emerald-600 text-white py-3 font-semibold hover:bg-emerald-700 transition shadow">
        <i class="fa-solid fa-paper-plane mr-2"></i> Enviar interesse
      </button>
    </form>
  </div>

</div>
{% endblock %}
